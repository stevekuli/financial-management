    <style>
        /* Quiz 专属样式 */
        .quiz-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .question-card {
            display: none;
            animation: fadeInUp 0.5s ease;
        }

        .question-card.active {
            display: block;
        }

        .quiz-progress {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: var(--space-sm);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            margin-bottom: var(--space-lg);
            transform: translateZ(0);
            /* 开启硬件加速防闪烁 */
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-gold);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .question-title {
            font-size: 1.25rem;
            margin-bottom: var(--space-md);
            color: var(--text-primary);
        }

        .option-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            text-align: left;
            padding: var(--space-md);
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 1rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-btn:hover {
            background: rgba(212, 167, 69, 0.05);
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }

        .result-card {
            display: none;
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }

        .result-card.active {
            display: block;
        }

        .result-title {
            font-size: 1.5rem;
            color: var(--accent-gold);
            margin-bottom: var(--space-sm);
        }

        .result-desc {
            color: var(--text-secondary);
            margin-bottom: var(--space-lg);
        }
        .quiz-restart-wrap {
            display: flex;
            justify-content: center;
            margin-top: var(--space-xl);
        }

        .quiz-restart-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 168px;
            padding: 0.95rem 1.7rem;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.05));
            color: #f8fafc;
            font-size: 0.98rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            overflow: hidden;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow:
                0 18px 40px rgba(2, 6, 23, 0.38),
                inset 0 1px 0 rgba(255, 255, 255, 0.24),
                inset 0 -1px 0 rgba(255, 255, 255, 0.06);
            transition:
                transform var(--transition-fast),
                border-color var(--transition-fast),
                box-shadow var(--transition-fast),
                background var(--transition-fast);
        }

        .quiz-restart-btn::before {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(212, 167, 69, 0.08));
            z-index: 0;
        }

        .quiz-restart-btn::after {
            content: '';
            position: absolute;
            top: -10%;
            left: -38%;
            width: 34%;
            height: 120%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.38), transparent);
            transform: skewX(-22deg);
            transition: left 0.55s ease;
            z-index: 0;
        }

        .quiz-restart-btn span {
            position: relative;
            z-index: 1;
        }

        .quiz-restart-btn:hover {
            transform: translateY(-3px) scale(1.01);
            border-color: rgba(212, 167, 69, 0.42);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(212, 167, 69, 0.08));
            box-shadow:
                0 24px 50px rgba(2, 6, 23, 0.46),
                0 0 0 1px rgba(212, 167, 69, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.28);
        }

        .quiz-restart-btn:hover::after {
            left: 110%;
        }

        .quiz-restart-btn:active {
            transform: translateY(0) scale(0.99);
        }

        .quiz-restart-btn:focus-visible {
            outline: none;
            border-color: rgba(212, 167, 69, 0.46);
            box-shadow:
                0 0 0 3px rgba(212, 167, 69, 0.18),
                0 20px 45px rgba(2, 6, 23, 0.42),
                inset 0 1px 0 rgba(255, 255, 255, 0.26);
        }

        @media (max-width: 640px) {
            .quiz-restart-btn {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
</head>
