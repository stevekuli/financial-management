<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="理财工具箱：定投计算器 - 模拟按月定期投资的复利回报">
    <title>定投计算器 — 理财入门指南</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo"><span>💎</span> 理财入门指南</a>
            <button class="nav-toggle" aria-label="菜单"><span></span><span></span><span></span></button>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">投资品种 <span class="dropdown-arrow">▾</span></button>
                    <div class="nav-dropdown-menu" id="navCategoryMenu"></div>
                </div>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn active">工具 <span class="dropdown-arrow">▾</span></button>
                    <div class="nav-dropdown-menu" id="navToolMenu">
                        </div>
                </div>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-btn">学习 <span class="dropdown-arrow">▾</span></button>
                    <div class="nav-dropdown-menu">
                        <a href="glossary.html">📖 投资术语表</a>
                        <a href="mistakes.html">⚠️ 新手避坑指南</a>
                        <a href="quiz.html">🧪 投资风格测试</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <div class="container">
            <div class="page-icon">📅</div>
            <h1>定投计算器</h1>
            <p>时间加上纪律，是普通人积累财富最稳健的武器。</p>
        </div>
    </section>

    <section class="content-section">
        <div class="container">
            <div class="content-block">
                <a href="calculator.html"
                    style="color:var(--text-secondary); text-decoration:none; display:inline-block; margin-bottom:var(--space-md); font-size:0.9rem;">←
                    返回工具箱</a>

                <div class="calculator-wrapper">
                    <div class="calculator-form">
                        <div class="form-group">
                            <label for="initial">初始投资 (元) <span
                                    style="font-size: 0.8rem; font-weight: normal; color: var(--text-muted);">(选填)</span></label>
                            <input type="number" id="initial" value="0" min="0" step="1000">
                        </div>

                        <div class="form-group">
                            <label for="monthly">每月投入 (元)</label>
                            <input type="number" id="monthly" value="2000" min="0" step="100">
                        </div>

                        <div class="form-group">
                            <label for="rate">预计年化收益率 (%)</label>
                            <input type="number" id="rate" value="8" min="0" max="100" step="0.1">
                        </div>

                        <div class="form-group">
                            <label for="years">定投年限 (年)</label>
                            <input type="number" id="years" value="10" min="1" max="50">
                        </div>

                        <button class="btn btn-primary" id="calcBtn"
                            style="width: 100%; margin-top: var(--space-md);">计算收益</button>
                    </div>

                    <div class="calculator-result">
                        <div class="result-number">
                            <span class="result-label">期末总金额</span>
                            <span class="result-value" id="totalAmount">¥0</span>
                        </div>
                        <div class="result-details">
                            <div class="detail-item">
                                <span class="detail-label">总投入本金:</span>
                                <span class="detail-value" id="principalTotal">¥0</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">定投总收益:</span>
                                <span class="detail-value text-green" id="interestTotal">+¥0</span>
                            </div>
                        </div>

                        <div class="chart-container">
                            <canvas id="dcaChart"></canvas>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p class="footer-author">微信公众号：<span>程序员柚子</span></p>
                <p class="footer-copyright">© 2026 理财入门指南 · 程序员柚子</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/render.js"></script>
    <script src="js/calc-dca.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Render.populateNavMenus();
        });
    </script>
</body>

</html>
